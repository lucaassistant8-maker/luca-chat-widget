<!-- ============================================================
     LUCA Chat Widget — Atelier Sistémico
     Pegar en: Framer > Settings > Custom Code > End of <body>
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  /* ── Variables ── */
  :root {
    --obsidian:    #1A1A1A;
    --obsidian-80: rgba(26,26,26,0.92);
    --obsidian-60: rgba(26,26,26,0.6);
    --cream:       #E6D9C9;
    --cream-20:    rgba(230,217,201,0.12);
    --cream-40:    rgba(230,217,201,0.25);
    --bone:        #F5F5F0;
    --bone-60:     rgba(245,245,240,0.6);
    --border:      rgba(230,217,201,0.18);
    --shadow:      0 32px 80px rgba(0,0,0,0.55), 0 8px 24px rgba(0,0,0,0.4);
  }

  /* ── Reset para el widget ── */
  #luca-root * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Jost', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Botón disparador ── */
  #luca-trigger {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 9998;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--obsidian);
    border: 1px solid var(--border);
    color: var(--bone);
    padding: 14px 22px 14px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.25s, border-color 0.25s, transform 0.2s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    user-select: none;
  }
  #luca-trigger:hover {
    background: #222;
    border-color: rgba(230,217,201,0.4);
    transform: translateY(-2px);
  }
  #luca-trigger:active { transform: translateY(0); }

  /* Pulso crema */
  .luca-pulse-dot {
    width: 9px;
    height: 9px;
    background: var(--cream);
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .luca-pulse-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid var(--cream);
    animation: luca-pulse 2s ease-out infinite;
  }
  @keyframes luca-pulse {
    0%   { opacity: 0.9; transform: scale(1); }
    70%  { opacity: 0;   transform: scale(2.2); }
    100% { opacity: 0;   transform: scale(2.2); }
  }

  /* ── Panel del chat ── */
  #luca-panel {
    position: fixed;
    bottom: 100px;
    right: 32px;
    z-index: 9999;
    width: 380px;
    height: 560px;
    background: var(--obsidian);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.3s cubic-bezier(.4,0,.2,1),
                transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  #luca-panel.luca-open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* ── Header ── */
  #luca-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    flex-shrink: 0;
  }
  .luca-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .luca-avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--cream-20);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .luca-avatar svg {
    width: 16px;
    height: 16px;
    opacity: 0.85;
  }
  .luca-header-info {}
  .luca-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--bone);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .luca-status {
    font-size: 10px;
    font-weight: 400;
    color: var(--bone-60);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .luca-status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #7BC67E;
    flex-shrink: 0;
  }
  #luca-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--bone-60);
    padding: 4px;
    border-radius: 4px;
    line-height: 0;
    transition: color 0.2s, background 0.2s;
  }
  #luca-close:hover {
    color: var(--bone);
    background: var(--cream-20);
  }

  /* ── Área de mensajes ── */
  #luca-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #luca-messages::-webkit-scrollbar { width: 4px; }
  #luca-messages::-webkit-scrollbar-track { background: transparent; }
  #luca-messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  /* Mensaje individual */
  .luca-msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: luca-msg-in 0.28s ease-out both;
  }
  @keyframes luca-msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .luca-msg.luca-user { align-self: flex-end; align-items: flex-end; }
  .luca-msg.luca-bot  { align-self: flex-start; align-items: flex-start; }

  .luca-bubble {
    padding: 11px 15px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.65;
    font-weight: 400;
  }
  .luca-user .luca-bubble {
    background: var(--cream);
    color: var(--obsidian);
    border-bottom-right-radius: 2px;
  }
  .luca-bot .luca-bubble {
    background: var(--cream-20);
    border: 1px solid var(--border);
    color: var(--bone);
    border-bottom-left-radius: 2px;
  }
  .luca-msg-time {
    font-size: 10px;
    color: var(--bone-60);
    margin-top: 5px;
    letter-spacing: 0.03em;
  }

  /* Indicador de escritura */
  #luca-typing {
    display: none;
    align-self: flex-start;
    align-items: center;
    gap: 12px;
    padding: 11px 15px;
    background: var(--cream-20);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-bottom-left-radius: 2px;
  }
  #luca-typing.visible { display: flex; }
  .luca-typing-text {
    font-size: 12px;
    color: var(--bone-60);
    letter-spacing: 0.04em;
    font-style: italic;
  }
  .luca-dots {
    display: flex;
    gap: 4px;
  }
  .luca-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--cream);
    animation: luca-dot 1.3s ease-in-out infinite;
  }
  .luca-dots span:nth-child(2) { animation-delay: 0.2s; }
  .luca-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes luca-dot {
    0%, 60%, 100% { opacity: 0.25; transform: scale(0.9); }
    30% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Footer / Input ── */
  #luca-footer {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    background: rgba(255,255,255,0.015);
    flex-shrink: 0;
  }
  .luca-input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--cream-20);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .luca-input-row:focus-within {
    border-color: rgba(230,217,201,0.45);
  }
  #luca-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--bone);
    font-size: 13.5px;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #luca-input::-webkit-scrollbar { display: none; }
  #luca-input::placeholder {
    color: var(--bone-60);
    font-style: italic;
  }
  #luca-send {
    background: var(--cream);
    border: none;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
    line-height: 0;
  }
  #luca-send:hover { background: var(--bone); transform: scale(1.05); }
  #luca-send:active { transform: scale(0.97); }
  #luca-send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  #luca-send svg { width: 15px; height: 15px; }

  .luca-hint {
    font-size: 10px;
    color: var(--bone-60);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    #luca-panel {
      right: 12px;
      left: 12px;
      width: auto;
      bottom: 90px;
    }
    #luca-trigger {
      right: 16px;
      bottom: 20px;
    }
  }
</style>

<div id="luca-root">
  <!-- Botón disparador -->
  <button id="luca-trigger" aria-label="Abrir chat con LUCA">
    <span class="luca-pulse-dot"></span>
    Hablar con LUCA
  </button>

  <!-- Panel del chat -->
  <div id="luca-panel" role="dialog" aria-label="Chat con LUCA" aria-modal="true">

    <!-- Header -->
    <div id="luca-header">
      <div class="luca-header-left">
        <div class="luca-avatar">
          <!-- Ícono L minimalista -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 5v14h10v-2.5H9.5V5H7Z" fill="#E6D9C9"/>
          </svg>
        </div>
        <div class="luca-header-info">
          <div class="luca-name">LUCA</div>
          <div class="luca-status">
            <span class="luca-status-dot"></span>
            Asistente activo
          </div>
        </div>
      </div>
      <button id="luca-close" aria-label="Cerrar chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Mensajes -->
    <div id="luca-messages" role="log" aria-live="polite">
      <!-- Mensaje de bienvenida -->
      <div class="luca-msg luca-bot">
        <div class="luca-bubble">
          Hola, soy LUCA — tu asistente de IA para emprendedores. ¿En qué puedo ayudarte hoy?
        </div>
        <span class="luca-msg-time">ahora</span>
      </div>

      <!-- Indicador de escritura -->
      <div id="luca-typing">
        <span class="luca-typing-text">LUCA está procesando</span>
        <div class="luca-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="luca-footer">
      <div class="luca-input-row">
        <textarea
          id="luca-input"
          rows="1"
          placeholder="Escribe tu pregunta..."
          aria-label="Mensaje para LUCA"
          autocomplete="off"
        ></textarea>
        <button id="luca-send" aria-label="Enviar mensaje">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="luca-hint">Presiona Enter para enviar · Shift+Enter para nueva línea</p>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── Config ── */
  const WEBHOOK_URL = 'https://luca8.app.n8n.cloud/webhook/b17468e9-aa32-44f9-b0b5-bc0c91c33663/chat';
  const SESSION_ID  = 'luca_' + Math.random().toString(36).slice(2, 11);

  /* ── Elementos ── */
  const trigger  = document.getElementById('luca-trigger');
  const panel    = document.getElementById('luca-panel');
  const closeBtn = document.getElementById('luca-close');
  const messages = document.getElementById('luca-messages');
  const input    = document.getElementById('luca-input');
  const sendBtn  = document.getElementById('luca-send');
  const typing   = document.getElementById('luca-typing');

  let isOpen    = false;
  let isBusy    = false;
  let msgHistory = [];

  /* ── Toggle panel ── */
  function openChat() {
    isOpen = true;
    panel.classList.add('luca-open');
    trigger.setAttribute('aria-expanded', 'true');
    setTimeout(() => input.focus(), 320);
  }
  function closeChat() {
    isOpen = false;
    panel.classList.remove('luca-open');
    trigger.setAttribute('aria-expanded', 'false');
  }

  trigger.addEventListener('click', () => isOpen ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  /* Cerrar al hacer clic fuera */
  document.addEventListener('click', (e) => {
    if (isOpen && !panel.contains(e.target) && e.target !== trigger) {
      closeChat();
    }
  });

  /* Cerrar con Escape */
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isOpen) closeChat();
  });

  /* ── Auto-resize del textarea ── */
  input.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  /* ── Helpers de tiempo ── */
  function getTime() {
    return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }

  /* ── Agregar mensaje al DOM ── */
  function addMessage(text, role) {
    // Saca el typing del flujo para mantener el orden
    messages.removeChild(typing);

    const wrap = document.createElement('div');
    wrap.className = `luca-msg luca-${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'luca-bubble';

    const time = document.createElement('span');
    time.className = 'luca-msg-time';
    time.textContent = getTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messages.appendChild(wrap);

    // Vuelve a poner el typing al final
    messages.appendChild(typing);

    scrollBottom();

    if (role === 'bot') {
      typeEffect(bubble, text);
    } else {
      bubble.textContent = text;
    }

    return bubble;
  }

  /* ── Efecto de escritura ── */
  function typeEffect(el, text, speed = 18) {
    let i = 0;
    el.textContent = '';
    const interval = setInterval(() => {
      el.textContent += text[i];
      i++;
      scrollBottom();
      if (i >= text.length) clearInterval(interval);
    }, speed);
  }

  /* ── Scroll al fondo ── */
  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  /* ── Mostrar / ocultar typing ── */
  function showTyping() {
    typing.classList.add('visible');
    scrollBottom();
  }
  function hideTyping() {
    typing.classList.remove('visible');
  }

  /* ── Enviar mensaje ── */
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isBusy) return;

    isBusy = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    // Mostrar burbuja del usuario
    addMessage(text, 'user');
    msgHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: SESSION_ID,
          chatInput: text,
          message: text,
          history: msgHistory
        })
      });

      if (!res.ok) throw new Error(`Error del servidor: ${res.status}`);

      const data = await res.json();

      // Extrae el texto de la respuesta (varios formatos posibles de n8n)
      const reply =
        data?.output           ||
        data?.text             ||
        data?.message          ||
        data?.response         ||
        (Array.isArray(data) && (data[0]?.output || data[0]?.text || data[0]?.message)) ||
        'Lo siento, no pude procesar tu mensaje. Inténtalo de nuevo.';

      hideTyping();
      msgHistory.push({ role: 'assistant', content: reply });
      addMessage(reply, 'bot');

    } catch (err) {
      console.error('[LUCA]', err);
      hideTyping();
      addMessage('Hubo un problema al conectar con LUCA. Por favor, inténtalo en unos momentos.', 'bot');
    } finally {
      isBusy = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  /* ── Eventos de envío ── */
  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

})();
</script>
